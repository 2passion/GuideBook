<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{앱이름}} 튜토리얼</title>
<style>
  *{box-sizing:border-box}
  body{font-family:'Malgun Gothic',sans-serif;background:#f9fafb;margin:0;padding:20px;color:#1f2937}
  .container{max-width:720px;margin:0 auto;background:white;border-radius:16px;padding:32px;box-shadow:0 4px 6px rgba(0,0,0,.07)}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .header h1{margin:0;font-size:18px;color:#1e3a5f}
  .print-btn{padding:6px 14px;background:white;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:13px}
  .role-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid #e5e7eb}
  .role-tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;color:#9ca3af;border-bottom:3px solid transparent}
  .role-tab.active{color:#1e3a5f;border-bottom-color:#3b82f6}
  .role-panel{display:none}
  .role-panel.active{display:block}
  .step-num{font-size:13px;color:#6b7280;font-weight:600;letter-spacing:.05em;margin-bottom:8px}
  h2{color:#1e3a5f;margin:0 0 16px;font-size:22px}
  .progress-bar{background:#e5e7eb;border-radius:99px;height:6px;margin-bottom:24px}
  .progress-fill{background:#3b82f6;height:100%;border-radius:99px;transition:width .3s}
  .screen-area{background:#f3f4f6;border-radius:12px;min-height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;padding:16px;text-align:center;cursor:zoom-in}
  .screen-area img{max-width:100%;border-radius:8px}
  .mock-screen{color:#9ca3af;font-size:14px}
  .content p,.content li{font-size:15px;line-height:1.7;margin:6px 0}
  .warning{background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:12px 16px;margin:12px 0;color:#92400e;font-size:14px}
  .checkpoint{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin:20px 0;color:#166534;font-size:14px}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid #e5e7eb}
  .nav button{padding:10px 24px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}
  .nav button:disabled{background:#d1d5db;cursor:default}
  .nav button:hover:not(:disabled){background:#2563eb}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:100}
  .lightbox img{max-width:90%;max-height:90%;border-radius:8px}
  @media(max-width:600px){.container{padding:20px}}
  @media print{.nav,.role-tabs{display:none}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{앱이름}} 튜토리얼</h1>
    <button class="print-btn" onclick="window.print()">인쇄</button>
  </div>

  <div class="role-tabs">
    <div class="role-tab active" onclick="switchRole('a')" id="tab-a">{{역할1}}</div>
    <div class="role-tab" onclick="switchRole('b')" id="tab-b">{{역할2}}</div>
  </div>

  <div class="role-panel active" id="panel-a">
    <!-- {{역할1}} STEP 반복 삽입 -->
    <div class="step">
      <div class="step-num">STEP 1 / N</div>
      <h2>{{단계_제목}}</h2>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      <div class="screen-area" onclick="openLightbox(this)">
        <div class="mock-screen">📸 화면 캡처 영역</div>
      </div>
      <div class="content"><p>{{행동_설명}}</p></div>
      <div class="checkpoint">✅ {{체크포인트}}</div>
      <div class="nav">
        <button disabled>← 이전</button><span>1 / N</span>
        <button>다음 →</button>
      </div>
    </div>
  </div>

  <div class="role-panel" id="panel-b">
    <!-- {{역할2}} STEP 반복 삽입 -->
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="">
</div>

<script>
function switchRole(role){
  document.getElementById('tab-a').classList.toggle('active', role==='a');
  document.getElementById('tab-b').classList.toggle('active', role==='b');
  document.getElementById('panel-a').classList.toggle('active', role==='a');
  document.getElementById('panel-b').classList.toggle('active', role==='b');
}
function openLightbox(el){
  var img = el.querySelector('img');
  if(!img) return;
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox').style.display = 'flex';
}
</script>
</body>
</html>
